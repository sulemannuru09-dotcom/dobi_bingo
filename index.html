<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo App</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .stat-box { background: #2d2d44; padding: 8px; border-radius: 5px; font-size: 11px; }
        .stat-box span { display: block; font-weight: bold; font-size: 14px; }
        
        .number-grid { 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; 
            max-height: 400px; overflow-y: auto; padding: 5px; background: rgba(255,255,255,0.05); border-radius: 10px;
        }
        .num-btn { background: #3d3d5c; color: white; border: 1px solid #555; padding: 12px 0; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .num-btn:active { background: #e94560; }

        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #16213e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { font-size: 12px; color: #888; text-decoration: none; text-align: center; }
        .nav-item.active { color: #4ecca3; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-box">Main Wallet<span id="main-balance">0</span></div>
        <div class="stat-box">Play Wallet<span id="play-balance">0</span></div>
        <div class="stat-box">Stake<span id="stake">10</span></div>
    </div>

    <div class="number-grid" id="grid"></div>

    <div style="height: 60px;"></div> <div class="nav-bar">
        <div class="nav-item active">🎮<br>Game</div>
        <div class="nav-item">🕒<br>History</div>
        <div class="nav-item">💰<br>Wallet</div>
        <div class="nav-item">👤<br>Profile</div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        for (let i = 1; i <= 100; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => alert("ካርቴላ ቁጥር " + i + " ተመርጧል!");
            grid.appendChild(btn);
        }
    </script>

</html>
